<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ServiceFlow — Find local services</title>
<link rel="stylesheet" href="_ds/serviceflow-design-system-c6741d18-e4e2-4a01-84ec-391cb83d6d23/tokens/fonts.css">
<link rel="stylesheet" href="_ds/serviceflow-design-system-c6741d18-e4e2-4a01-84ec-391cb83d6d23/tokens/colors.css">
<link rel="stylesheet" href="_ds/serviceflow-design-system-c6741d18-e4e2-4a01-84ec-391cb83d6d23/tokens/typography.css">
<link rel="stylesheet" href="_ds/serviceflow-design-system-c6741d18-e4e2-4a01-84ec-391cb83d6d23/tokens/spacing.css">
<link rel="stylesheet" href="_ds/serviceflow-design-system-c6741d18-e4e2-4a01-84ec-391cb83d6d23/styles.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg-page);font-family:var(--font-sans);color:var(--text-body)}
  .container{max-width:1180px;margin:0 auto;padding:0 28px}

  /* hero */
  .hero{position:relative;overflow:hidden;padding:56px 0 56px;
    background:linear-gradient(180deg, var(--cream-100) 0%, var(--cream-50) 78%)}
  .hero .sun{position:absolute;top:-160px;right:-120px;width:460px;height:460px;border-radius:50%;
    background:radial-gradient(circle at center, var(--yellow-200) 0%, rgba(255,224,140,0) 68%);pointer-events:none}
  .eyebrow{display:inline-flex;align-items:center;gap:9px;padding:8px 16px;background:var(--white);
    color:var(--yellow-700);border:1.5px solid var(--yellow-200);border-radius:999px;font-size:12.5px;
    font-weight:800;letter-spacing:.04em;text-transform:uppercase;margin-bottom:20px;box-shadow:var(--shadow-xs)}
  .eyebrow-center{background:var(--white)}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--success-500);box-shadow:0 0 0 0 rgba(31,157,99,.5);
    animation:pulse 2s var(--ease-out) infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(31,157,99,.45)}70%{box-shadow:0 0 0 7px rgba(31,157,99,0)}100%{box-shadow:0 0 0 0 rgba(31,157,99,0)}}
  .hero h1{font-family:var(--font-display);font-size:66px;font-weight:800;letter-spacing:-.035em;line-height:.98;
    color:var(--ink-900);margin:0 0 18px;position:relative}
  .hero h1 em{font-style:normal;color:var(--accent-press)}
  .hero p{font-size:19px;font-weight:500;line-height:1.5;color:var(--ink-500);margin:0 0 30px;max-width:540px;position:relative}

  /* booking panel */
  .bookpanel{position:relative;background:var(--white);border:1.5px solid var(--border-card);
    border-radius:var(--radius-2xl);box-shadow:var(--shadow-xl);padding:30px;max-width:1024px}
  .bookgrid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px}
  .whenrow{margin-top:24px}
  .whenlabel{display:block;margin-bottom:12px;font-size:14px;font-weight:700;color:var(--text-heading)}
  .ctarow{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-top:26px;
    padding-top:24px;border-top:1px solid var(--border-soft);flex-wrap:wrap}
  .ctahint{font-size:13.5px;font-weight:600;color:var(--ink-400)}
  .trustline{display:flex;align-items:center;gap:8px;margin-top:24px;font-size:14.5px;font-weight:500;color:var(--ink-500)}
  .trustline strong{color:var(--ink-800);font-weight:800}

  /* generic blocks */
  .block{padding:64px 28px}
  .blockhead{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:30px;flex-wrap:wrap}
  .secTitle{font-family:var(--font-display);font-size:34px;font-weight:800;letter-spacing:-.025em;color:var(--ink-900);margin:0}
  .secSub{font-size:16px;font-weight:500;color:var(--ink-500);margin:8px 0 0}
  .seeall{font-size:14.5px;font-weight:700;color:var(--accent-press);text-decoration:none}
  .seeall:hover{color:var(--yellow-600)}

  /* category tiles */
  .catgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .cattile{display:flex;flex-direction:column;align-items:flex-start;gap:6px;text-align:left;
    padding:24px;background:var(--white);border:1.5px solid var(--border-card);border-radius:var(--radius-xl);
    cursor:pointer;transition:transform var(--dur-base) var(--ease-out),box-shadow var(--dur-base) var(--ease-out),border-color var(--dur-base) var(--ease-out);font-family:inherit}
  .caticon{display:inline-flex;align-items:center;justify-content:center;width:54px;height:54px;border-radius:16px;
    background:var(--yellow-100);color:var(--yellow-700);margin-bottom:8px}
  .catlabel{font-family:var(--font-display);font-size:20px;font-weight:700;letter-spacing:-.01em;color:var(--ink-900)}
  .catcount{font-size:13.5px;font-weight:600;color:var(--ink-400)}

  /* benefits */
  .warmband{background:var(--bg-section);border-top:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft)}
  .bengrid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:34px}
  .bencard{background:var(--white);border:1.5px solid var(--border-card);border-radius:var(--radius-xl);
    padding:30px;box-shadow:var(--shadow-sm)}
  .benicon{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--yellow-200), var(--yellow-50));color:var(--accent-press);
    box-shadow:inset 0 0 0 1.5px var(--yellow-200);margin-bottom:18px}
  .bencard h3{font-family:var(--font-display);font-size:21px;font-weight:700;letter-spacing:-.01em;color:var(--ink-900);margin:0 0 10px}
  .bencard p{font-size:15px;font-weight:500;line-height:1.6;color:var(--ink-600);margin:0}

  /* final cta */
  .finalcta{display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;
    background:var(--white);border:1.5px solid var(--border-card);border-radius:var(--radius-2xl);
    padding:38px 42px;box-shadow:var(--shadow-md)}
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="_ds/serviceflow-design-system-c6741d18-e4e2-4a01-84ec-391cb83d6d23/_ds_bundle.js"></script>
  <script type="text/babel" src="screens/HomeSearchPage.jsx" data-presets="react"></script>
  <script type="text/babel" data-presets="react">
    ReactDOM.createRoot(document.getElementById('root')).render(<HomeSearchPage/>);
  </script>
</body></html>
