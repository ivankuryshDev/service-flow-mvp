<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ServiceFlow — Bookings</title>
<link rel="stylesheet" href="_ds/serviceflow-design-system-c6741d18-e4e2-4a01-84ec-391cb83d6d23/tokens/fonts.css">
<link rel="stylesheet" href="_ds/serviceflow-design-system-c6741d18-e4e2-4a01-84ec-391cb83d6d23/tokens/colors.css">
<link rel="stylesheet" href="_ds/serviceflow-design-system-c6741d18-e4e2-4a01-84ec-391cb83d6d23/tokens/typography.css">
<link rel="stylesheet" href="_ds/serviceflow-design-system-c6741d18-e4e2-4a01-84ec-391cb83d6d23/tokens/spacing.css">
<link rel="stylesheet" href="_ds/serviceflow-design-system-c6741d18-e4e2-4a01-84ec-391cb83d6d23/styles.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg-page);font-family:var(--font-sans);color:var(--text-body)}
  header{backdrop-filter:none !important;-webkit-backdrop-filter:none !important}
  .container{max-width:1280px;margin:0 auto;padding:0 32px}

  /* ===== page header ===== */
  .pghead{padding:30px 0 4px;display:flex;align-items:flex-end;justify-content:space-between;gap:28px;flex-wrap:wrap}
  .pgcrumb{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:800;letter-spacing:.06em;
    text-transform:uppercase;color:var(--ink-400);margin-bottom:12px}
  .pgcrumb svg{color:var(--accent-press)}
  .pgtitle{font-family:var(--font-display);font-size:40px;font-weight:800;letter-spacing:-.03em;line-height:1;
    color:var(--ink-900);margin:0 0 9px}
  .pgsub{font-size:15px;font-weight:600;color:var(--ink-500);margin:0}
  .pgsub b{color:var(--ink-800);font-weight:800}
  .pgactions{display:flex;align-items:center;gap:12px}
  .daterange{display:inline-flex;align-items:center;gap:11px;background:var(--white);border:1.5px solid var(--border);
    border-radius:999px;padding:11px 18px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;color:var(--ink-800);
    transition:border-color var(--dur-fast) var(--ease-out)}
  .daterange:hover{border-color:var(--accent-strong)}
  .daterange svg{color:var(--accent-press)}
  .daterange .chev{color:var(--ink-400)}

  /* ===== filter bar ===== */
  .filterbar{display:flex;align-items:center;gap:12px;background:var(--white);border:1.5px solid var(--border-card);
    border-radius:var(--radius-xl);box-shadow:var(--shadow-sm);padding:14px;margin-top:26px}
  .fsearch{flex:1;min-width:200px;display:flex;align-items:center;gap:11px;height:52px;padding:0 18px;
    background:var(--cream-50);border:1.5px solid var(--border-input);border-radius:var(--radius-md);
    transition:border-color var(--dur-fast) var(--ease-out),box-shadow var(--dur-fast) var(--ease-out)}
  .fsearch:focus-within{border-color:var(--border-focus);box-shadow:0 0 0 4px var(--focus-ring);background:var(--white)}
  .fsearch svg{color:var(--ink-400);flex-shrink:0}
  .fsearch input{flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:inherit;font-size:15px;
    font-weight:500;color:var(--text-heading)}
  .fdivide{width:1.5px;height:32px;background:var(--border-soft);flex-shrink:0}
  .clearbtn{display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-size:13.5px;font-weight:700;
    color:var(--ink-500);background:none;border:none;cursor:pointer;padding:8px 10px;border-radius:999px;white-space:nowrap;
    transition:color var(--dur-fast) var(--ease-out)}
  .clearbtn:hover{color:var(--error-700)}
  .clearbtn:disabled{color:var(--ink-300);cursor:default}

  /* status tabs row */
  .tabrow{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:22px;flex-wrap:wrap}
  .resultcount{font-size:13.5px;font-weight:700;color:var(--ink-400)}
  .resultcount b{color:var(--ink-700);font-weight:800}
  .statepreview{display:inline-flex;align-items:center;gap:8px}
  .statepreview .pvlbl{font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-300)}
  .seg{display:inline-flex;background:var(--white);border:1.5px solid var(--border);border-radius:999px;padding:3px;gap:2px}
  .segbtn{font-family:inherit;font-size:12.5px;font-weight:700;color:var(--ink-500);background:none;border:none;
    padding:7px 13px;border-radius:999px;cursor:pointer;transition:all var(--dur-fast) var(--ease-out)}
  .segbtn.on{background:var(--ink-900);color:var(--cream-50)}

  /* ===== table ===== */
  .tbl{background:var(--white);border:1.5px solid var(--border-card);border-radius:var(--radius-xl);
    box-shadow:var(--shadow-sm);overflow:hidden;margin-top:16px}
  .tblwrap{min-width:1040px}
  @media (max-width:1180px){.tbl{overflow-x:auto}}
  .tcols{display:grid;grid-template-columns:118px 1.5fr 1.4fr 150px 92px 132px 116px;align-items:center}
  .tcols>div{min-width:0}
  .thead{background:var(--cream-100);border-bottom:1px solid var(--border-soft)}
  .thead .tcols>div{padding:15px 16px;font-size:11.5px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-500)}
  .trow{position:relative;cursor:pointer;transition:background var(--dur-fast) var(--ease-out)}
  .trow + .trow{border-top:1px solid var(--border-soft)}
  .trow:hover{background:var(--yellow-50)}
  .trow.sel{background:var(--yellow-50)}
  .trow.sel::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent-strong)}
  .trow .tcols>div{padding:16px}
  .cref{font-family:var(--font-mono);font-size:13px;font-weight:500;letter-spacing:-.02em;color:var(--ink-600)}
  .ccust{display:flex;align-items:center;gap:12px;min-width:0}
  .cava{width:38px;height:38px;border-radius:11px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;
    font-family:var(--font-display);font-weight:800;font-size:13.5px;color:var(--ink-800);background:var(--yellow-100)}
  .cust-tx{min-width:0}
  .cust-tx .nm{font-size:14.5px;font-weight:800;color:var(--ink-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cust-tx .ct{font-size:12px;font-weight:600;color:var(--ink-400);display:flex;align-items:center;gap:5px;margin-top:1px}
  .csvc{font-size:14px;font-weight:600;color:var(--ink-700);text-wrap:pretty}
  .cdt{display:flex;flex-direction:column;gap:1px}
  .cdt .d{font-size:13.5px;font-weight:700;color:var(--ink-800)}
  .cdt .tm{font-family:var(--font-mono);font-size:12px;color:var(--ink-400);letter-spacing:-.02em}
  .cprice{font-family:var(--font-mono);font-size:14.5px;font-weight:500;color:var(--ink-900)}
  .cact{display:flex;align-items:center;justify-content:flex-end;gap:7px}
  .iconbtn{width:38px;height:38px;border-radius:11px;border:1.5px solid var(--border);background:var(--white);
    display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-600);
    transition:all var(--dur-fast) var(--ease-out)}
  .iconbtn:hover{border-color:var(--accent-strong);color:var(--accent-press);background:var(--yellow-50)}
  .iconbtn.primary{background:var(--accent-strong);border-color:var(--accent-strong);color:var(--ink-900);box-shadow:var(--shadow-accent)}
  .iconbtn.primary:hover{background:var(--accent-hover)}
  .iconbtn.go{background:var(--success-500);border-color:var(--success-500);color:var(--white)}
  .iconbtn.go:hover{filter:brightness(.95)}

  /* skeleton */
  .skelrow{border-top:1px solid var(--border-soft)}
  .skelrow:first-child{border-top:none}
  .sk{height:14px;border-radius:7px;background:linear-gradient(100deg,var(--cream-100) 30%,var(--cream-200) 50%,var(--cream-100) 70%);
    background-size:280% 100%;animation:shimmer 1.25s linear infinite}
  .skc{width:38px;height:38px;border-radius:11px;background:linear-gradient(100deg,var(--cream-100) 30%,var(--cream-200) 50%,var(--cream-100) 70%);
    background-size:280% 100%;animation:shimmer 1.25s linear infinite}
  @keyframes shimmer{from{background-position:200% 0}to{background-position:-80% 0}}

  /* error state */
  .errstate{display:flex;flex-direction:column;align-items:center;text-align:center;gap:13px;padding:62px 24px;
    background:var(--white);border:1.5px solid var(--border-card);border-radius:var(--radius-xl);box-shadow:var(--shadow-sm);margin-top:16px}
  .errstate .eic{width:74px;height:74px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
    background:var(--error-100);color:var(--error-500)}
  .errstate h3{font-family:var(--font-display);font-size:23px;font-weight:800;letter-spacing:-.02em;color:var(--ink-900);margin:4px 0 0}
  .errstate p{font-size:15px;font-weight:500;color:var(--ink-500);margin:0;max-width:380px;line-height:1.5}

  /* ===== detail drawer ===== */
  .scrim{position:fixed;inset:0;z-index:90;background:rgba(27,24,19,.42);backdrop-filter:blur(3px)}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:460px;max-width:94vw;z-index:100;background:var(--white);
    box-shadow:var(--shadow-xl);display:flex;flex-direction:column}
  .dwtop{padding:24px 26px 20px;border-bottom:1px solid var(--border-soft);display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
  .dwref{display:inline-flex;align-items:center;gap:9px;font-family:var(--font-mono);font-size:12.5px;font-weight:500;
    color:var(--ink-400);letter-spacing:.02em;margin-bottom:12px}
  .dwname{font-family:var(--font-display);font-size:26px;font-weight:800;letter-spacing:-.02em;color:var(--ink-900);margin:0 0 12px;line-height:1.1}
  .dwclose{flex-shrink:0;width:42px;height:42px;border-radius:50%;border:none;background:var(--cream-100);color:var(--ink-600);
    cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:background var(--dur-fast) var(--ease-out)}
  .dwclose:hover{background:var(--cream-200)}
  .dwbody{flex:1;overflow-y:auto;padding:24px 26px}
  .dwsec{margin-bottom:26px}
  .dwsec:last-child{margin-bottom:0}
  .dwlabel{font-size:11.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-400);margin:0 0 13px}
  .dwcontact{display:flex;flex-direction:column;gap:11px}
  .dwline{display:flex;align-items:center;gap:13px;font-size:14.5px;font-weight:600;color:var(--ink-700)}
  .dwline .li{width:38px;height:38px;border-radius:11px;background:var(--cream-100);color:var(--accent-press);
    display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
  .dwline a{color:var(--text-link);text-decoration:none;font-weight:700}
  .dwline .mut{color:var(--ink-400);font-weight:600;font-size:12.5px}
  .svcbox{background:var(--cream-50);border:1.5px solid var(--border-soft);border-radius:var(--radius-lg);padding:18px 20px}
  .svcbox .srow{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:9px 0}
  .svcbox .srow + .srow{border-top:1px dashed var(--border)}
  .svcbox .sk2{font-size:13.5px;font-weight:700;color:var(--ink-400);display:inline-flex;align-items:center;gap:9px}
  .svcbox .sk2 svg{color:var(--ink-300)}
  .svcbox .sv{font-size:14px;font-weight:800;color:var(--ink-800);text-align:right}
  .svcbox .sv.mono{font-family:var(--font-mono);font-weight:500}
  .svcbox .sv.big{font-family:var(--font-display);font-size:20px;letter-spacing:-.02em}
  .notebox{background:var(--info-100);border-radius:var(--radius-lg);padding:16px 18px;font-size:14px;line-height:1.55;
    font-weight:500;color:var(--info-700);display:flex;gap:12px}
  .notebox .ni{flex-shrink:0;color:var(--info-500);margin-top:1px}
  .notebox.empty{background:var(--cream-100);color:var(--ink-400)}
  .notebox.empty .ni{color:var(--ink-300)}

  /* timeline */
  .timeline{position:relative;padding-left:4px}
  .tlitem{position:relative;padding:0 0 20px 28px}
  .tlitem:last-child{padding-bottom:0}
  .tlitem::before{content:'';position:absolute;left:7px;top:18px;bottom:-2px;width:2px;background:var(--border)}
  .tlitem:last-child::before{display:none}
  .tldot{position:absolute;left:0;top:3px;width:16px;height:16px;border-radius:50%;background:var(--white);
    border:3px solid var(--border-strong)}
  .tldot.done{border-color:var(--success-500);background:var(--success-500)}
  .tldot.now{border-color:var(--accent-strong);background:var(--accent-strong);box-shadow:0 0 0 4px var(--yellow-100)}
  .tlitem .tt{font-size:14px;font-weight:800;color:var(--ink-800)}
  .tlitem .ts{font-size:13px;font-weight:600;color:var(--ink-500);margin-top:2px}
  .tlitem .tw{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-300);margin-top:3px;letter-spacing:-.01em}

  .dwfoot{padding:18px 26px 22px;border-top:1px solid var(--border-soft);background:var(--cream-50);
    display:flex;flex-direction:column;gap:10px}
  .dwfoot .frow{display:flex;gap:10px}
  .dangerbtn{flex:1;height:52px;border-radius:999px;border:1.5px solid #E6C4BC;background:var(--white);color:var(--error-700);
    font-family:inherit;font-size:14.5px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;
    transition:all var(--dur-fast) var(--ease-out)}
  .dangerbtn:hover{background:var(--error-100);border-color:var(--error-500)}
  .closednote{display:flex;align-items:center;gap:9px;justify-content:center;font-size:13px;font-weight:700;
    padding:14px;border-radius:14px}
  .closednote.ok{background:var(--success-100);color:var(--success-700)}
  .closednote.no{background:var(--cream-100);color:var(--ink-500)}

  .toasts{position:fixed;right:24px;bottom:24px;z-index:200;display:flex;flex-direction:column;gap:12px}
</style>
</head>
<body>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="_ds/serviceflow-design-system-c6741d18-e4e2-4a01-84ec-391cb83d6d23/_ds_bundle.js"></script>

</body></html>
